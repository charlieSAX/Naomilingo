<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#F8FAF5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#10130D" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Turn the Italian articles you read into spaced-repetition study." />

    <!-- iOS install / standalone -->
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- Fonts: Newsreader (reading) + Hanken Grotesk (UI). Cached offline by the service worker. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&display=swap"
      rel="stylesheet"
    />

    <title>Naomilingo</title>

    <!-- Apply saved reading mode before first paint so there is no flash. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('naomilingo-theme');
          if (t === 'dark' || t === 'light') {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch (e) {}
      })();
    </script>
